<div id="releases" style="background-color:#f2f2f2; margin-top:-10px;">
    <!-- Release information will be dynamically added here -->
</div>

    <script>
        // GitHub repository details
        const owner = 'Dueris';
        const repo = 'CanvasMC';

        // GitHub API endpoint to fetch releases
        const apiUrl = `https://api.github.com/repos/${owner}/${repo}/releases`;

        // Fetch releases from GitHub API
        fetch(apiUrl)
            .then(response => response.json())
            .then(releases => {
                // Iterate through releases
                releases.forEach(release => {
                    // Create a new div element for each release
                    const releaseDiv = document.createElement('div');
                    releaseDiv.classList.add('downloadable'); // Add CSS class for styling

                    // Extract artifact name, changes, and commit hash from the description using regular expressions
                    const description = release.body;

                    const artifactRegex = /\["artifact_name"\s*=\s*([^,\]]+)/;
                    const artifactMatch = description.match(artifactRegex);

                    const changesRegex = /\["changes"\s*=\s*([^,\]]+)/;
                    const changesMatch = description.match(changesRegex);

                    const commitRegex = /\["commit_hash"\s*=\s*([^,\]]+)/;
                    const commitMatch = description.match(commitRegex);

                    const versionRegex = /\["version"\s*=\s*([^,\]]+)/;
                    const versionMatch = description.match(versionRegex);

                    if (artifactMatch && changesMatch && commitMatch && versionMatch) {
                        const artifactName = artifactMatch[1];
                        const changesText = changesMatch[1];
                        const commitHash = commitMatch[1].substring(0, 6);
                        const versionType = versionMatch[1];

                        // Set the HTML content for the release information
                        releaseDiv.innerHTML = `
                            <div class="button-container">
                                <button class="download-button">
                                    <div class="downloadable_button">
                                        <p>
                                            <span style="margin-left: 4px;">${versionType}</span>
                                            <img src="../assets/download_button.png" style="margin-top: -2px; margin-left: -3px;" class="downloadbutton">
                                        </p>
                                    </div>
                                </button>
                                <button style="
                                    font-size: 18px;
                                    font-family: monospace;
                                    margin-left: 3px;
                                    border: none;
                                    background: white;
                                    margin-top: -7px;
                                    vertical-align: middle;
                                ">
                                    <span>#${commitHash}</span>
                                </button>
                                <p style="
                                    margin-top: 7px;
                                    font-size: 16px;
                                    font-family: system-ui;
                                    margin-left: 4px;
                                    vertical-align: middle;
                                ">: <span>${changesText}</span></p>
                            </div>
                            <hr>
                        `;

                        const asset = release.assets.find(asset => asset.name.includes(artifactName));
                        if (asset) {
                            const downloadButton = releaseDiv.querySelector('.download-button');
                            downloadButton.onclick = function () {
                                window.location.href = asset.browser_download_url;
                            };
                        } else {
                            console.error(`Asset "${artifactName}" not found in this release.`);
                        }

                        document.getElementById('releases').appendChild(releaseDiv);
						
						filterReleasesByVersion('1.20.2');
                    } else {
                        console.error('Artifact name, changes, version, or commit hash information not found in the description.');
                    }
                });
            })
            .catch(error => {
                console.error('Error fetching releases:', error);
            });
			
        function filterReleasesByVersion(version) {
            const releaseDivs = document.querySelectorAll('.downloadable');
            releaseDivs.forEach(releaseDiv => {
                const releaseVersion = releaseDiv.querySelector('.download-button span').textContent.replace(/[^0-9.]/g, '');
                if (releaseVersion === version) {
                    releaseDiv.style.display = 'block';
                } else {
                    releaseDiv.style.display = 'none';
                }
            });
        }

        const tabButtons = document.querySelectorAll('.tab-button');
        tabButtons.forEach(tabButton => {
            tabButton.addEventListener('click', () => {
                tabButtons.forEach(button => {
                    button.classList.remove('active');
                });

                tabButton.classList.add('active');

                const version = tabButton.getAttribute('data-version');

				console.log(version)
                filterReleasesByVersion(version);
            });
        });
    </script>
